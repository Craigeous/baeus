name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: write

jobs:
  # ── macOS: clippy + test + build ─────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-arm64-cargo-

      - name: Clippy
        env:
          RUST_MIN_STACK: "268435456"
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        env:
          RUST_MIN_STACK: "268435456"
        run: cargo nextest run --workspace

      - name: Build release binary
        env:
          RUST_MIN_STACK: "268435456"
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create .app bundle + DMG
        run: |
          APP_NAME="Baeus"
          BINARY_NAME="baeus-app"
          BUNDLE_DIR="target/release/${APP_NAME}.app"
          BINARY="target/aarch64-apple-darwin/release/${BINARY_NAME}"

          mkdir -p "${BUNDLE_DIR}/Contents/MacOS"
          mkdir -p "${BUNDLE_DIR}/Contents/Resources"

          cp macos/Info.plist "${BUNDLE_DIR}/Contents/Info.plist"
          cp "${BINARY}" "${BUNDLE_DIR}/Contents/MacOS/${BINARY_NAME}"

          if [[ -f macos/AppIcon.icns ]]; then
            cp macos/AppIcon.icns "${BUNDLE_DIR}/Contents/Resources/AppIcon.icns"
          fi

          echo -n "APPL????" > "${BUNDLE_DIR}/Contents/PkgInfo"

          STAGING_DIR=$(mktemp -d)
          cp -r "${BUNDLE_DIR}" "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"
          hdiutil create -volname "${APP_NAME}" -srcfolder "${STAGING_DIR}" \
            -ov -format UDZO "Baeus-macos-arm64.dmg"
          rm -rf "${STAGING_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baeus-macos-arm64.dmg
          path: Baeus-macos-arm64.dmg

  # ── Linux: clippy + test + build ─────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ make cmake clang mold \
            libasound2-dev libfontconfig-dev libgit2-dev \
            libglib2.0-dev libssl-dev libva-dev \
            libvulkan1 libwayland-dev libx11-xcb-dev \
            libxkbcommon-x11-dev libzstd-dev libstdc++-14-dev \
            libsqlite3-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x64-cargo-

      - name: Clippy
        env:
          RUST_MIN_STACK: "268435456"
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        env:
          RUST_MIN_STACK: "268435456"
        run: cargo nextest run --workspace

      - name: Build release binary
        env:
          RUST_MIN_STACK: "268435456"
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/baeus-app dist/baeus
          tar -czf Baeus-linux-x86_64.tar.gz -C dist baeus
          rm -rf dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baeus-linux-x86_64.tar.gz
          path: Baeus-linux-x86_64.tar.gz

  # ── Create release after all builds pass ─────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-build.${{ github.run_number }}
          generate_release_notes: true
          files: artifacts/*
