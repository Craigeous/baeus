[advisories]
ignore = [
    # Transitive dependencies from kube-rs — unmaintained but not security vulnerabilities.
    # These will be resolved when kube-rs updates its dependency tree.
    { id = "RUSTSEC-2025-0012", reason = "backoff is a transitive dep of kube-runtime, no direct usage" },
    { id = "RUSTSEC-2024-0384", reason = "instant is a transitive dep of backoff via kube-runtime" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile is a transitive dep of kube-client" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
